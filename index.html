<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  
  <title>Frontend Mentor | QR code component</title>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap');
    
    body {
      display: grid;
      place-items: center;
      height: 100vh;
      margin: 0;
      font-family: 'Outfit';
      background-color: hsl(212, 45%, 89%);
    }

    h3 {
      color: hsl(218, 44%, 22%);
      font-weight: 700;
    }

    p {
        color:hsl(216, 15%, 48%);
        font-weight: 400;
    }

    .container {
      display: flex;
      flex-direction: column;
      align-items:center;
      justify-content:center;
      padding: 2rem;
      background-color: hsl(0, 0%, 100%);
      width: 300px;
      height: 450px;
      border-radius: 10px 10px 10px 10px;
      text-align: center;
      box-shadow: 0 4px 8px 0 rgba(0, 0, 0, 0.2);
    }

    .box {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background-color: hsl(212, 45%, 89%);
      width: 1300px;
      min-height:720px;
      margin: 0 auto;
    }

    .QR {
      width: 310px;
      height: 310px;
      border-radius: 10px 10px 10px 10px;
    }

    .attribution { font-size: 0.6875rem; text-align: center; }
    .attribution a { color: hsl(228, 45%, 44%); }
  </style>
</head>
<body>

  <div class="box">
    <div class="container">
      <img src="./images/image-qr-code.png" alt="QR Code" class="QR">
      <h2>Improve your front-end skills by building projects</h2>
      <p>Scan the QR code to visit Frontend Mentor and take your coding skills to the next level</p>
    </div>
  </div>

  
  <footer class="attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>. 
    Coded by <a href="#">Lorenzo Tablante</a>.
  </footer>
</body>
</html>
